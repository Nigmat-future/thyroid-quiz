<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ThyroPADA</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="page-backdrop"></div>

  <header class="site-header">
    <div class="brand-lockup">
      <p class="eyebrow">ThyroPADA · 专家影像评估平台</p>
      <h1>ThyroPADA</h1>
      <p class="brand-copy">面向多中心临床研究的甲状腺超声图像判读与数据标注平台，支持参考标准维护、过程留痕与结构化导出。</p>
    </div>
  </header>

  <main class="page-shell">
    <section class="panel">
      <div id="auth-state"><p class="brand-copy">加载中…</p></div>
    </section>

    <div id="body-after-auth" class="hidden">
      <section class="panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">研究任务</p>
            <h2>选择研究任务或批次，开始图像判读</h2>
          </div>
        </div>
        <div id="tasks-root" class="tasks-list"><p class="brand-copy">加载中…</p></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">我的判读</p>
            <h2>判读记录</h2>
          </div>
        </div>
        <div id="history-root"><p class="brand-copy">加载中…</p></div>
      </section>
    </div>
  </main>

  <script type="module" src="/static/js/home.js"></script>
</body>
</html>
