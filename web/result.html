<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>判读结果 · ThyroPADA</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="page-backdrop"></div>

  <header class="site-header">
    <div class="brand-lockup">
      <p class="eyebrow">判读结果</p>
      <h1 id="task-name">判读结果</h1>
      <p class="brand-copy" id="task-meta">加载中…</p>
    </div>
    <nav class="header-links">
      <a href="/" class="nav-link">← 返回首页</a>
    </nav>
  </header>

  <main class="page-shell">
    <section class="panel">
      <div class="result-summary">
        <div class="big-score">
          <strong id="answered-pct">--%</strong>
          <span>完成率</span>
        </div>
        <div class="summary-grid">
          <div class="summary-card"><span>已评估</span><strong id="answered-num">-</strong></div>
          <div class="summary-card"><span>题数</span><strong id="total-num">-</strong></div>
          <div class="summary-card"><span>标记复查</span><strong id="review-num">-</strong></div>
          <div class="summary-card"><span>提交时间</span><strong id="submitted-at">-</strong></div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <p class="eyebrow">逐图像明细</p>
          <h2>我的判读</h2>
        </div>
      </div>
      <div id="rows-root" class="result-rows"><p class="brand-copy">加载中…</p></div>
    </section>
  </main>

  <div class="lightbox hidden" id="lightbox">
    <div class="lightbox-toolbar" role="toolbar" aria-label="图像查看工具">
      <button type="button" class="lightbox-tool" id="zoom-out-btn">缩小</button>
      <button type="button" class="lightbox-tool" id="zoom-in-btn">放大</button>
      <button type="button" class="lightbox-tool" id="fit-btn">适应窗口</button>
      <button type="button" class="lightbox-tool" id="actual-btn">原始大小</button>
      <button type="button" class="lightbox-close" id="lightbox-close">关闭</button>
    </div>
    <div class="lightbox-stage" id="lightbox-stage"><img id="lightbox-image" alt=""></div>
  </div>

  <script type="module" src="/static/js/result.js"></script>
</body>
</html>
