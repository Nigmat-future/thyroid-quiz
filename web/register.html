<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>注册 · 甲状腺超声答题</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="page-backdrop"></div>

  <main class="auth-shell">
    <section class="panel auth-panel">
      <p class="eyebrow">账号注册</p>
      <h1 class="auth-title">注册</h1>
      <p class="brand-copy">注册后默认为「医生」角色。如需出题人或管理员权限，请联系管理员升级。</p>

      <form id="register-form" class="form-grid" autocomplete="on">
        <label class="field">
          <span>用户名 *</span>
          <input id="username" name="username" type="text" autocomplete="username" required minlength="3" maxlength="32" pattern="[A-Za-z0-9_]+" placeholder="3-32 位字母数字下划线">
        </label>
        <label class="field">
          <span>显示名</span>
          <input id="display_name" name="display_name" type="text" autocomplete="name" maxlength="128" placeholder="例如：张医生">
        </label>
        <label class="field">
          <span>密码 *</span>
          <input id="password" name="password" type="password" autocomplete="new-password" required minlength="6" maxlength="128">
        </label>
        <label class="field">
          <span>确认密码 *</span>
          <input id="password2" name="password2" type="password" autocomplete="new-password" required minlength="6" maxlength="128">
        </label>
        <div class="actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">创建账号</button>
        </div>
        <p class="feedback" id="feedback"></p>
      </form>

      <p class="auth-foot">已有账号？<a href="/login">直接登录</a></p>
    </section>
  </main>

  <script type="module" src="/static/js/auth.js"></script>
</body>
</html>
