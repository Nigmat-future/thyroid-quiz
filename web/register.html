<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>注册 · ThyroPADA</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="page-backdrop"></div>

  <main class="auth-shell">
    <section class="panel auth-panel">
      <p class="eyebrow">研究账号注册</p>
      <h1 class="auth-title">注册</h1>
      <p class="brand-copy">注册后默认为「判读者」。任务管理或管理员权限由管理员分配。</p>

      <form id="register-form" class="form-grid" autocomplete="on">
        <label class="field">
          <span>用户名 *</span>
          <input id="username" name="username" type="text" autocomplete="username" required minlength="3" maxlength="32" pattern="[A-Za-z0-9_]+" placeholder="3-32 位字母数字下划线">
        </label>
        <label class="field">
          <span>真名 *</span>
          <input id="display_name" name="display_name" type="text" autocomplete="name" required maxlength="128" placeholder="例如：张三">
        </label>
        <label class="field">
          <span>工作医院 *</span>
          <input id="work_hospital" name="work_hospital" type="text" required maxlength="256" placeholder="例如：北京协和医院">
        </label>
        <label class="field">
          <span>医师职称 *</span>
          <input id="physician_title" name="physician_title" type="text" required maxlength="64" placeholder="例如：主治医师（研究生可填「无」）">
        </label>
        <label class="field">
          <span>身份类型 *</span>
          <select id="career_stage" name="career_stage" required>
            <option value="">请选择</option>
            <option value="graduate">研究生</option>
            <option value="practitioner">已入职大夫</option>
            <option value="other">其他</option>
          </select>
        </label>
        <label class="field hidden" id="career-other-wrap">
          <span>请说明身份 *</span>
          <input id="career_stage_other" name="career_stage_other" type="text" maxlength="128" placeholder="例如：进修医师 / 规培生">
        </label>
        <label class="field">
          <span>取得执业医师资格证后的时间（年） *</span>
          <input id="license_years" name="license_years" type="number" min="0" max="80" required placeholder="未取得填 0">
        </label>
        <label class="field">
          <span>密码 *</span>
          <input id="password" name="password" type="password" autocomplete="new-password" required minlength="6" maxlength="128">
        </label>
        <label class="field">
          <span>确认密码 *</span>
          <input id="password2" name="password2" type="password" autocomplete="new-password" required minlength="6" maxlength="128">
        </label>
        <div class="actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">创建账号</button>
        </div>
        <p class="feedback" id="feedback"></p>
      </form>

      <p class="auth-foot">已有账号？<a href="/login">直接登录</a></p>
    </section>
  </main>

  <script type="module" src="/static/js/auth.js"></script>
</body>
</html>
