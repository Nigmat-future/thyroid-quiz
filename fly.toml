# Fly.io 部署配置；首次使用：
#   fly launch --no-deploy
#   fly volumes create thyroid_data --size 1 --region nrt
#   fly secrets set SECRET_KEY=$(openssl rand -hex 32)
#   fly deploy

app = "thyroid-quiz"           # 改成你自己的 app 名（fly 全局唯一）
primary_region = "nrt"          # 东京；离国内最近的免费区

[build]
  dockerfile = "Dockerfile"

[env]
  APP_HOST = "0.0.0.0"
  APP_PORT = "8000"
  APP_ENV = "production"
  DATABASE_URL = "sqlite:////data/thyroid_quiz.db"
  STORAGE_DIR = "/data/storage"

[mounts]
  source = "thyroid_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    [http_service.checks.health]
      type = "http"
      interval = "30s"
      timeout = "5s"
      grace_period = "20s"
      method = "GET"
      path = "/api/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
